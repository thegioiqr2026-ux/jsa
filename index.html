<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VDC SAFETY AI - SOL61 v02</title>
    <script type="importmap">
      { "imports": { "@google/generative-ai": "https://esm.run/@google/generative-ai" } }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .sol61-gradient { background: linear-gradient(135deg, #1e40af 0%, #1d4ed8 100%); }
        .result-card { border-left: 4px solid #f97316; }
        @keyframes pulse-fast { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .fast-pulse { animation: pulse-fast 1s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col items-center p-4">
    
    <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">
        <div class="sol61-gradient p-6 text-white text-center relative">
            <div class="absolute top-2 right-4 text-[10px] font-mono opacity-70">VERSION: SOL61 v02</div>
            <h1 class="text-2xl font-black tracking-tight text-white">VDC SAFETY AI</h1>
            <p class="text-blue-100 text-xs font-medium uppercase tracking-widest mt-1 italic">Tối ưu tốc độ phân tích</p>
        </div>

        <div class="p-6 space-y-5">
            <div>
                <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1 ml-1">Gemini API Key</label>
                <input type="password" id="apiKey" placeholder="Dán mã bảo mật API..." 
                    class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm transition">
            </div>

            <div class="relative group">
                <input type="file" id="imageInput" accept="image/*" capture="camera" class="hidden">
                <label for="imageInput" class="flex flex-col items-center justify-center border-2 border-dashed border-blue-100 rounded-2xl py-6 bg-blue-50/30 cursor-pointer hover:bg-blue-50 transition active:scale-95">
                    <div id="uploadIcon" class="w-10 h-10 bg-white rounded-full shadow-sm flex items-center justify-center text-xl mb-2">📷</div>
                    <span class="text-sm font-bold text-blue-700">Chụp hiện trường</span>
                    <canvas id="resizeCanvas" class="hidden"></canvas>
                    <img id="preview" class="hidden mt-2 max-h-40 rounded-lg shadow-md border-2 border-white">
                </label>
            </div>

            <button id="btnAnalyze" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-black py-4 rounded-2xl shadow-lg shadow-orange-200 transition-all active:scale-[0.98]">
                PHÂN TÍCH NGAY
            </button>

            <div id="loading" class="hidden flex flex-col items-center py-4">
                <div class="w-8 h-8 border-4 border-blue-100 border-t-blue-600 rounded-full animate-spin"></div>
                <p class="text-blue-600 font-bold text-[11px] mt-2 fast-pulse uppercase">Đang nén ảnh & Đối chiếu...</p>
            </div>

            <div id="result" class="hidden space-y-4">
                <div class="result-card bg-orange-50 p-4 rounded-xl shadow-sm border border-orange-100">
                    <h3 class="text-orange-800 font-black text-xs uppercase mb-2">⚠️ PHÂN TÍCH AN TOÀN</h3>
                    <div id="resultText" class="text-sm text-gray-800 leading-relaxed overflow-auto max-h-96 whitespace-pre-wrap"></div>
                </div>
            </div>
        </div>

        <div class="p-4 bg-gray-50 text-center border-t border-gray-100">
            <p class="text-[9px] text-gray-400 font-bold uppercase">Phát triển bởi VDC - SOL61 v02</p>
        </div>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";

        const btn = document.getElementById('btnAnalyze');
        const imgInput = document.getElementById('imageInput');
        const preview = document.getElementById('preview');
        const resultText = document.getElementById('resultText');
        const resultDiv = document.getElementById('result');
        const loading = document.getElementById('loading');
        const canvas = document.getElementById('resizeCanvas');

        if(localStorage.getItem('vdc_key')) document.getElementById('apiKey').value = localStorage.getItem('vdc_key');

        imgInput.onchange = e => {
            const file = e.target.files[0];
            if (file) {
                preview.src = URL.createObjectURL(file);
                preview.classList.remove('hidden');
                document.getElementById('uploadIcon').classList.add('hidden');
            }
        };

        // Hàm nén ảnh để chạy nhanh hơn
        async function compressImage(file) {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = URL.createObjectURL(file);
                img.onload = () => {
                    const ctx = canvas.getContext('2d');
                    const MAX_WIDTH = 1024; // Giảm độ phân giải xuống mức vừa đủ cho AI
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    } else {
                        if (height > MAX_WIDTH) { width *= MAX_WIDTH / height; height = MAX_WIDTH; }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.7).split(',')[1]); // Nén chất lượng 70%
                };
            });
        }

        btn.onclick = async () => {
            const key = document.getElementById('apiKey').value;
            const file = imgInput.files[0];
            if (!key || !file) return alert("Vui lòng nhập Key và Chụp ảnh!");

            localStorage.setItem('vdc_key', key);
            loading.classList.remove('hidden');
            resultDiv.classList.add('hidden');
            btn.disabled = true;
            resultText.innerText = "";

            try {
                const genAI = new GoogleGenerativeAI(key);
                const model = genAI.getGenerativeModel({ 
                    model: "gemini-1.5-flash-latest",
                    generationConfig: { temperature: 0.4, topP: 0.8, topK: 40 } 
                });

                const base64Data = await compressImage(file);
                
                const prompt = "Bạn là Chuyên gia An toàn Điện EVN. Phân tích nhanh ảnh này theo QĐ 278/QĐ-EVN: 1.Mối nguy, 2.Rủi ro, 3.Biện pháp. Trả lời ngắn gọn, trực diện.";

                // Sử dụng Stream để nhận kết quả từng phần (nhanh hơn)
                const result = await model.generateContentStream([
                    prompt,
                    { inlineData: { data: base64Data, mimeType: "image/jpeg" } }
                ]);

                resultDiv.classList.remove('hidden');
                loading.classList.add('hidden');

                for await (const chunk of result.stream) {
                    const chunkText = chunk.text();
                    resultText.innerHTML += chunkText.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
                }

            } catch (e) {
                alert("Lỗi: " + e.message);
                loading.classList.add('hidden');
            } finally {
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
